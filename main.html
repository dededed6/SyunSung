<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8"/>
    <title>SyunSung❤️</title>
    <style>
        @font-face {
                font-family : 'jalnan';
                src : url(fonts/Jalnan.ttf);
        }
        p {
            text-align: center;
            font-family: jalnan;
            color: white;
            font-size: 6vh;
            padding: 0%;
            margin: 0%;
            -webkit-text-stroke: 0.2vh black;
            text-shadow: 1px 1px 5px 2px black;
        }
        .day {
            text-align: center;
            font-family: jalnan;
            color: black;
            border-color: transparent;
            background-color: white;
            border-radius: 12vh;
            font-size: 2vh;
            margin: 1vh;
            padding: 1vh;
            width: 10vh;
            height: 10vh;
            box-shadow: 1px 1px 5px -2px black;
            transition: 0.8s;
        }
        .day:hover {
            background-color: #5599D9;
            color: white;
            transition: 0.4s;
        }
        .container {
            text-align: center;
            padding: 0;
            margin:0%;
        }

    </style>

    <script>

        var container;
        var D = 0;
        var today = 0;
        window.onload=function() {
            var date = new Date();
            today = getDateDiff("2023-04-17", date);
            container = document.getElementsByTagName('div')[0];
            buildCalender(10);
        }

        function buildCalender(line) {
            for(var y=0; y<line; y++) {
                var con = document.createElement('div');
                con.className = 'container';
                for(var x=0; x<7; x++) {
                    var button = document.createElement('input');
                    button.type = 'button';
                    button.className = 'day';
                    button.id = D;
                    button.value = D;
                    button.onclick = onClick;

                    if(D == today) {
                        button.style.backgroundColor = '#5599D9';
                        button.style.color = '#ffffff';
                    }
                    D++;
                    con.appendChild(button);
                }
                container.appendChild(con);
            }
        }

        const getDateDiff = (d1, d2) => {
            const date1 = new Date(d1);
            const date2 = new Date(d2);
            
            const diffDate = date1.getTime() - date2.getTime();
            
            return Math.ceil(Math.abs(diffDate / (1000 * 60 * 60 * 24))); // 밀리세컨 * 초 * 분 * 시 = 일
        }

        function onClick() {
            
        }

        function scrollEnd() {
            var scrollHeight = document.compatMode=="CSS1Compat"? document.documentElement.scrollHeight : document.body.scrollHeight;
            var clientHeight = document.compatMode=="CSS1Compat"? document.documentElement.clientHeight : document.body.clientHeight;
            var ScrollTop = document.compatMode == "CSS1Compat"? document.documentElement.scrollTop : document.body.scrollTop;
            var scrollPos = scrollHeight - ScrollTop;

            if (clientHeight == scrollPos) {
                buildCalender(3)
            }
        }
    </script>
</head>
<body bgcolor="#8DC5D6" oncontextmenu="return false" ondragstart="return false" onselectstart="return false" style="padding: 0%; margin: 0%;" onscroll="scrollEnd();">
    <div class="container" style="height:101vh;">
        <p style="background-color: black; color: white; font-style: italic; padding: 1%; margin: 0%; margin-bottom: 2%; font-size: 8vh;">SyunSung❤️</p>
        <p style="font-size: 4vh;">BGM</p>
        <iframe width="560" height="315" src="https://www.youtube.com/embed/videoseries?controls=0&amp;list=PLN29PNMEdVhwMw_Zl2fapizKn82mfESe2" title="SyunSung BGM" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
        <p style="font-size: 4vh; margin-top: 5%;">D❤️ Memorys</p>
    </div>
</body>
</html>
